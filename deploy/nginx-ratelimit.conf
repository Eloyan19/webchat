# Deployed to /etc/nginx/conf.d/webchat-ratelimit.conf
# Must live in http{} context (conf.d/* is included there), NOT inside a server
# or location block. Referenced by `limit_req zone=chat ...` in the /chat
# location of nginx-jorchik.conf.
#
# rate=30r/m (~0.5 req/s sustained) per client IP; burst=10 nodelay absorbs
# short spikes (a single chat send can fire 2 requests: summarize + chat).
limit_req_zone $binary_remote_addr zone=chat:10m rate=30r/m;
limit_req_status 429;
