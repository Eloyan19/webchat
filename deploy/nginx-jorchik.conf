# nginx location block for the webchat app — merged into the existing
# server { server_name jorchik.com; listen 443 ssl; } block in
# /etc/nginx/sites-available/jorchik.com (TLS managed by Certbot).
#
# Frontend static build is deployed to /var/www/webchat (see deploy/README.md).
# Backend runs as webchat.service on 127.0.0.1:8000 (same-origin /chat).

root /var/www/webchat;
index index.html;

location / {
    try_files $uri $uri/ /index.html;
}

location = /chat {
    proxy_pass http://127.0.0.1:8000/chat;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 120s;
}

location = /health {
    proxy_pass http://127.0.0.1:8000/health;
    proxy_set_header Host $host;
}
